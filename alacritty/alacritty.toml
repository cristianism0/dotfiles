[window]
dimensions = { columns = 120, lines = 35 }
padding = { x = 0, y = 0 }
decorations = "full"
startup_mode = "Windowed"

opacity = 0.8
blur = true

[font]
size = 15.0

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[cursor]
style = { shape = "Block", blinking = "Never" }

[scrolling]
history = 5000
multiplier = 3

[mouse]
hide_when_typing = true

[terminal.shell]
program = "/usr/bin/zsh"

[[keyboard.bindings]]
key = "Back"
mods = "Control|Shift"
action = "ResetFontSize"

[terminal]
